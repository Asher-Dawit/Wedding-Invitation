<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Wedding RSVP Dashboard | Abel & Hana</title>
    <!-- Google Fonts + Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Chart.js for pie chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1412 0%, #231e1b 100%);
            color: #f3e6e0;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header section */
        .dashboard-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .dashboard-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            font-weight: 600;
            color: #e9bcaf;
            letter-spacing: 1px;
        }
        .dashboard-header h1 i {
            color: #c27e64;
            margin-right: 0.5rem;
        }
        .dashboard-header p {
            color: #c7aaa0;
            font-size: 1rem;
            margin-top: 0.5rem;
        }

        /* Stats cards row */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }
        .stat-card {
            background: #2a231f;
            border-radius: 28px;
            padding: 1.5rem;
            box-shadow: 0 12px 25px -8px rgba(0,0,0,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
            border: 1px solid #4d3a33;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -12px rgba(201, 126, 94, 0.3);
            border-color: #c27e64;
        }
        .stat-icon {
            font-size: 2.2rem;
            color: #e9bcaf;
            margin-bottom: 0.75rem;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #f3d7cc;
            line-height: 1.2;
        }
        .stat-label {
            font-size: 0.9rem;
            color: #bda89e;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* Insight row: chart + table */
        .insight-row {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            margin-bottom: 2.5rem;
        }
        .chart-container {
            flex: 1;
            min-width: 250px;
            background: #2a231f;
            border-radius: 32px;
            padding: 1.5rem;
            box-shadow: 0 12px 25px -8px rgba(0,0,0,0.4);
            border: 1px solid #4d3a33;
        }
        .chart-container h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            color: #e9bcaf;
            margin-bottom: 1rem;
            text-align: center;
        }
        canvas {
            max-height: 250px;
            margin: 0 auto;
        }

        .table-wrapper {
            flex: 2;
            background: #2a231f;
            border-radius: 32px;
            padding: 1.2rem;
            box-shadow: 0 12px 25px -8px rgba(0,0,0,0.4);
            border: 1px solid #4d3a33;
            overflow-x: auto;
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #4d3a33;
        }
        .table-header h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            color: #e9bcaf;
        }
        .refresh-btn {
            background: #3d2d26;
            border: none;
            color: #e9bcaf;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
        }
        .refresh-btn:hover {
            background: #c27e64;
            color: #1a1412;
            transform: rotate(15deg);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th, td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #4d3a33;
        }
        th {
            font-weight: 600;
            color: #e9bcaf;
            background-color: #231e1b;
        }
        tr:hover {
            background-color: #3b2c26;
        }
        .attending-yes {
            color: #b8e0c2;
            background: #2d553b;
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
        }
        .attending-no {
            color: #f7cfc1;
            background: #5d3e33;
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        /* Empty state & loader */
        .empty-state, .loader {
            text-align: center;
            padding: 2rem;
            color: #bda89e;
        }

        /* Footer */
        .footer-note {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #bda89e;
            border-top: 1px dashed #4d3a33;
            padding-top: 1.5rem;
        }

        @media (max-width: 760px) {
            body { padding: 1rem; }
            .stat-value { font-size: 1.8rem; }
            .dashboard-header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="dashboard-header">
        <h1><i class="fas fa-heart"></i> Abel & Hana · RSVP Dashboard</h1>
        <p>View all guest responses at a glance</p>
    </div>

    <!-- Stats cards (filled dynamically) -->
    <div id="statsGrid" class="stats-grid">
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-envelope-open-text"></i></div><div class="stat-value">—</div><div class="stat-label">Total Responses</div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-value">—</div><div class="stat-label">Coming</div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-value">—</div><div class="stat-label">Total Guests Coming</div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-times-circle"></i></div><div class="stat-value">—</div><div class="stat-label">Not Coming</div></div>
    </div>

    <div class="insight-row">
        <!-- Pie chart section -->
        <div class="chart-container">
            <h3><i class="fas fa-chart-pie"></i> Attendance Overview</h3>
            <canvas id="attendanceChart" width="300" height="250" style="max-width:100%; height:auto;"></canvas>
        </div>

        <!-- Guest table with refresh -->
        <div class="table-wrapper">
            <div class="table-header">
                <h3><i class="fas fa-list-ul"></i> Guest List</h3>
                <button id="refreshBtn" class="refresh-btn" title="Refresh data"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>
            <div id="tableContainer">
                <table id="rsvpTable">
                    <thead>
                        <tr><th>Name</th><th>Email</th><th>Guests</th><th>Status</th><th>Submitted</th>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="5" class="empty-state">Loading responses...</td>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="footer-note">
        <i class="fas fa-calendar-alt"></i> Real-time data | Last updated: <span id="lastUpdated">—</span>
    </div>
</div>

<script>
    let chartInstance = null;

    async function loadData() {
        try {
            // Show loader in table body
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="loader"><i class="fas fa-spinner fa-pulse"></i> Refreshing...</td></tr>';
            
            const response = await fetch('/api/admin/rsvps');
            if (!response.ok) throw new Error('Network error');
            const data = await response.json();
            
            // Update stats cards
            const stats = data.stats;
            const statValues = document.querySelectorAll('.stat-value');
            statValues[0].innerText = stats.total;
            statValues[1].innerText = stats.coming;
            statValues[2].innerText = stats.totalGuests;
            statValues[3].innerText = stats.notComing;
            
            // Update table
            const tbody = document.getElementById('tableBody');
            if (data.rsvps.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">✨ No RSVPs yet. Share the invitation! ✨</td></tr>';
            } else {
                tbody.innerHTML = '';
                data.rsvps.forEach(r => {
                    const row = tbody.insertRow();
                    row.insertCell(0).innerText = r.name;
                    row.insertCell(1).innerHTML = `<a href="mailto:${r.email}" style="color:#e9bcaf; text-decoration:none;">${r.email}</a>`;
                    row.insertCell(2).innerText = r.guests;
                    const statusCell = row.insertCell(3);
                    const attendingText = r.attending ? 'Yes' : 'No';
                    const statusClass = r.attending ? 'attending-yes' : 'attending-no';
                    statusCell.innerHTML = `<span class="${statusClass}">${attendingText}</span>`;
                    row.insertCell(4).innerText = new Date(r.timestamp).toLocaleString();
                });
            }
            
            // Update last updated timestamp
            document.getElementById('lastUpdated').innerText = new Date().toLocaleTimeString();
            
            // Update pie chart
            updateChart(stats.coming, stats.notComing);
            
        } catch (error) {
            console.error('Error loading data:', error);
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="empty-state">⚠️ Failed to load responses. Make sure server is running.</td></tr>';
            document.getElementById('lastUpdated').innerText = 'error';
        }
    }
    
    function updateChart(coming, notComing) {
        const ctx = document.getElementById('attendanceChart').getContext('2d');
        if (chartInstance) {
            chartInstance.destroy();
        }
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['✅ Attending', '❌ Declined'],
                datasets: [{
                    data: [coming, notComing],
                    backgroundColor: ['#c27e64', '#6f4e40'],
                    borderColor: '#2a231f',
                    borderWidth: 2,
                    hoverOffset: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { position: 'bottom', labels: { color: '#f3e6e0', font: { size: 12, family: 'Inter' } } },
                    tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.raw} guest${ctx.raw !== 1 ? 's' : ''}` } }
                },
                cutout: '60%'
            }
        });
    }
    
    // Initial load
    loadData();
    
    // Refresh button
    document.getElementById('refreshBtn').addEventListener('click', () => {
        loadData();
    });
    
    // Auto-refresh every 30 seconds
    setInterval(loadData, 30000);
</script>
</body>
</html>
